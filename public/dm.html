<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Chat - UniThread</title>
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* A little extra CSS just for this chat box */
        .dm-container { max-width: 600px; margin: 40px auto; background: #1a1a2e; border-radius: 12px; padding: 20px; color: white; display: flex; flex-direction: column; height: 70vh; }
        .dm-header { font-size: 20px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .dm-box { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .msg { padding: 10px 15px; border-radius: 20px; max-width: 70%; word-wrap: break-word; }
        .msg.sent { background: #6b4ce6; align-self: flex-end; }
        .msg.received { background: #333; align-self: flex-start; }
        .dm-inputs { display: flex; gap: 10px; }
        .dm-inputs input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #222; color: white; }
        .dm-inputs button { padding: 12px 20px; background: #6b4ce6; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="dm-container">
        <div class="dm-header" id="chatHeader">Chatting with...</div>
        
        <div class="dm-box" id="dmBox">
            </div>

        <div class="dm-inputs">
            <input type="text" id="dmInput" placeholder="Type a message...">
            <button id="sendDmBtn">Send</button>
        </div>
        <button onclick="window.history.back()" style="margin-top: 15px; background: transparent; color: #888; border: none; cursor: pointer;">← Back to Feed</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="dm.js"></script> 
</body>
</html>
